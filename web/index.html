<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shell-remote</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="connect-page">
    <a class="github-link" href="https://github.com/zzttzzmyswy/shell-remote" target="_blank" rel="noopener" title="GitHub">
        <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
    </a>

    <!-- Connect Section -->
    <div class="connect-container">
        <h1>shell-remote</h1>
        <p class="subtitle">远程协作终端</p>
        <div class="connect-form">
            <label for="auth-input">服务器密码</label>
            <input type="password" id="auth-input" placeholder="服务器访问密码..." autocomplete="off">
            <label for="token-input">会话密钥</label>
            <input type="text" id="token-input" placeholder="粘贴会话密钥..." autocomplete="off">
            <div class="button-row">
                <button id="connect-btn" class="btn btn-primary">连接</button>
            </div>
            <div id="connect-error" class="error-message hidden"></div>
        </div>
    </div>

    <!-- Install Section -->
    <div class="install-section">
        <h2>一行命令启动客户端</h2>
        <p>在目标机器上执行以下命令即可自动部署并运行：</p>
        <div class="install-cmd">
            <code>$ curl -fsSL <span class="relay-host">https://host</span>/agent/install | sh</code>
            <button class="copy-btn" onclick="copyInstallCmd()">copy</button>
        </div>

    </div>

    <script>
        // ── Connect logic ──────────────────────────────────────────────
        const tokenInput = document.getElementById('token-input');
        const errorDiv = document.getElementById('connect-error');

        function connect() {
            const token = tokenInput.value.trim();
            if (!token) {
                showError('请输入会话密钥');
                return;
            }
            sessionStorage.setItem('shell-remote-token', token);
            window.location.href = '/session';
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        document.getElementById('connect-btn').addEventListener('click', () => connect());

        tokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') connect();
        });

        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            tokenInput.value = urlToken;
        }

        // ── Relay host substitution ────────────────────────────────────
        const relayHost = location.protocol + '//' + location.host;
        document.querySelectorAll('.relay-host').forEach(el => {
            el.textContent = relayHost;
        });

        function copyInstallCmd() {
            var cmd = 'curl -fsSL ' + location.protocol + '//' + location.host + '/agent/install | sh';
            navigator.clipboard.writeText(cmd).then(function() {
                var btn = document.querySelector('.install-cmd .copy-btn');
                btn.textContent = 'copied!';
                btn.classList.add('copied');
                setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
            });
        }
    </script>
</body>
</html>
